# Cotação atual: cache curto, ideal para dados que mudam ao longo do dia
quarkus.cache.caffeine."cotacao".expire-after-write=30S
quarkus.cache.caffeine."cotacao".maximum-size=500

# Cotação histórica: já fechou, pode durar bem mais
quarkus.cache.caffeine."cotacao-historica".expire-after-write=1H
quarkus.cache.caffeine."cotacao-historica".maximum-size=5000

quarkus.http.port=8080
