# =====================================================================
# DEV — Dev Services sobe o Postgres pra voce.
# Nao precisa de URL, usuario nem senha. Basta ter Docker rodando.
# =====================================================================
quarkus.datasource.db-kind=postgresql

# Schema: drop-and-create apaga e recria a cada start (so use em dev).
# Opcoes em prod: none | validate | update
quarkus.hibernate-orm.database.generation=drop-and-create

# Mostra cada SQL no console — essencial pra caçar N+1.
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true

# Carrega resources/import.sql apos criar o schema (seeds de dev).
quarkus.hibernate-orm.sql-load-script=import.sql

# =====================================================================
# PROD — sobrescreva via variaveis de ambiente:
#   QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db.prod:5432/livraria
#   QUARKUS_DATASOURCE_USERNAME=app
#   QUARKUS_DATASOURCE_PASSWORD=...
#   QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION=validate
# =====================================================================
%prod.quarkus.hibernate-orm.log.sql=false
%prod.quarkus.hibernate-orm.database.generation=validate
