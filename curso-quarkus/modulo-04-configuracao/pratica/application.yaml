#     remetente: no-reply@exemplo.com
#     assunto-padrao: Boas-vindas
#     copia-oculta: auditoria@exemplo.com
#   limite-requisicoes: 100
#   feature:
#     beta: false
#
# "%dev":
#   app:
#     email:
#       remetente: dev@local.test
#     feature:
#       beta: true
#   quarkus:
#     log:
#       level: DEBUG
