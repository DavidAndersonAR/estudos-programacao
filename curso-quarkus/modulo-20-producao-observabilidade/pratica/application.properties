# =========================================================
# Modulo 20 - application.properties (foco em profile %prod)
# =========================================================

quarkus.application.name=pedidos
quarkus.application.version=1.0.0

# ---------- DEV (padrao) ----------
quarkus.http.port=8080
quarkus.log.level=INFO
quarkus.log.category."com.exemplo".level=DEBUG
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.swagger-ui.always-include=true

# ---------- PROD ----------

# Banco: NUNCA recriar schema. Apenas validar contra o atual.
%prod.quarkus.hibernate-orm.database.generation=validate
%prod.quarkus.hibernate-orm.log.sql=false

# Datasource via env vars (nada de senha versionada)
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.jdbc.max-size=20
%prod.quarkus.datasource.jdbc.min-size=2

# Log estruturado JSON + nivel INFO (nada de DEBUG em prod)
%prod.quarkus.log.level=INFO
%prod.quarkus.log.console.json=true
%prod.quarkus.log.console.json.pretty-print=false
%prod.quarkus.log.console.json.exception-output-type=formatted

# Mascarar campos sensiveis no log estruturado (exemplo)
%prod.quarkus.log.category."org.hibernate.SQL".level=WARN

# OpenAPI / Swagger desligados em prod
%prod.quarkus.swagger-ui.always-include=false
%prod.quarkus.smallrye-openapi.always-include=false

# CORS travado (ajuste origens conforme front)
%prod.quarkus.http.cors=true
%prod.quarkus.http.cors.origins=https://app.exemplo.com.br
%prod.quarkus.http.cors.methods=GET,POST,PUT,DELETE

# Health checks (smallrye-health expoe /q/health)
%prod.quarkus.smallrye-health.root-path=/q/health
%prod.quarkus.smallrye-health.liveness-path=/q/health/live
%prod.quarkus.smallrye-health.readiness-path=/q/health/ready

# Graceful shutdown: aguarda ate 30s as requests terminarem
%prod.quarkus.shutdown.timeout=30s

# OpenTelemetry: traces via OTLP gRPC para Tempo/Collector
%prod.quarkus.otel.enabled=true
%prod.quarkus.otel.exporter.otlp.endpoint=${OTLP_ENDPOINT:http://otel-collector:4317}
%prod.quarkus.otel.exporter.otlp.protocol=grpc
%prod.quarkus.otel.traces.sampler=parentbased_traceidratio
%prod.quarkus.otel.traces.sampler.arg=0.1

# JWT: chave publica via secret/volume
%prod.mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_PATH}
%prod.mp.jwt.verify.issuer=${JWT_ISSUER}

# HTTP timeouts razoaveis
%prod.quarkus.http.read-timeout=30s
%prod.quarkus.http.idle-timeout=60s
