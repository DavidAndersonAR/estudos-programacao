# Stack Grafana simplificada para dev local.
# Sobe: Grafana + Tempo (traces) + Loki (logs) + Prometheus (metricas)
# + OpenTelemetry Collector (gateway que recebe da app e encaminha pro Tempo).
#
# Subir:   docker compose -f docker-compose.observability.yml up -d
# Grafana: http://localhost:3000  (admin/admin)
# A app deve mandar OTLP gRPC pra http://localhost:4317
#
# Datasources do Grafana ja apontam pros componentes via rede interna.

version: "3.8"

services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (app -> collector)
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.4.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"   # Tempo UI/API

  loki:
    image: grafana/loki:2.9.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - loki
      - prometheus
