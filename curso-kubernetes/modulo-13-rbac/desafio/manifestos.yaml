# 🎯 DESAFIO DO MÓDULO 13 — SA "ci-bot" com permissão mínima
#
# Cenário:
# Sua pipeline de CI precisa de uma ServiceAccount chamada "ci-bot" no
# namespace "apps-prod". Ela deve ser capaz de:
#
#   ✅ criar deployments
#   ✅ atualizar deployments (patch + update — pra rolar nova imagem)
#   ✅ listar e ver deployments (get/list/watch)
#   ❌ NÃO PODE deletar deployments
#   ❌ NÃO PODE ler secrets
#   ❌ NÃO PODE mexer em outros namespaces
#
# Preencha os TODOs. A solução de referência está no fim, comentada.
# Aplique com:  kubectl apply -f manifestos.yaml
# Teste com:    bash comandos.sh

