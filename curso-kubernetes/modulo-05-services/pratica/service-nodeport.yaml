# Service tipo NodePort — abre uma porta em TODOS os nodes do cluster.
# Faixa permitida: 30000-32767.
# No kind, pra essa porta funcionar do host, o cluster precisa ter sido criado com
# extraPortMappings. Como na prática a gente não recria o cluster só pra isso,
# o comandos.sh usa `kubectl port-forward` (funciona em qualquer cluster).
apiVersion: v1
kind: Service
metadata:
  name: web-demo-nodeport
spec:
  type: NodePort
  selector:
    app: web-demo
  ports:
    - name: http
      port: 80           # porta interna do Service
      targetPort: 80     # porta do Pod
      nodePort: 30080    # porta no IP do Node (se omitir, K8s sorteia)
      protocol: TCP
