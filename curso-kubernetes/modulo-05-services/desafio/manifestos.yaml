# 🎯 DESAFIO DO MÓDULO 05 — API + Cliente conversando por DNS interno
#
# O que você precisa montar aqui:
#
# 1. Um Deployment chamado "api" com 3 réplicas:
#    - imagem: hashicorp/http-echo:1.0
#    - args: ["-text=oi do pod", "-listen=:5678"]
#    - containerPort: 5678
#    - label: app=api
#
# 2. Um Service ClusterIP chamado "api-svc" que selecione os pods da api:
#    - port: 80    (porta DO Service)
#    - targetPort: 5678   (porta DO Pod)
#
# 3. Um Pod "cliente" usando a imagem curlimages/curl:8.10.1:
#    - command: ["sh", "-c", "sleep 3600"]   (pra ficar vivo pra você dar exec)
#    - sem labels especiais
#
# Critério de sucesso: o `comandos.sh` consegue, de dentro do pod cliente,
# fazer `curl http://api-svc` e ver as respostas vindo dos 3 pods diferentes
# (load balancing).
#
# Dicas:
# - Lembre que selector do Service tem que casar com labels do template do Deployment.
# - O nome curto "api-svc" basta no mesmo namespace.
# - Pra ver de qual pod a resposta veio, o http-echo retorna sempre o mesmo texto —
#   então no desafio o comandos.sh usa um truque: olha os logs de cada pod pra
#   contar quantas requisições cada um recebeu. Outra opção: passar o nome do pod
#   via env var e usar nginx (como na prática).

