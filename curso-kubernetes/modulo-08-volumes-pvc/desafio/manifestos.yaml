# 🎯 DESAFIO MÓDULO 08 — Postgres com PVC
#
# Objetivo:
# Rodar um Postgres num Deployment com PVC. Criar uma tabela e inserir linhas.
# Matar o pod (ou escalar pra 0 e voltar). Provar que os dados continuam lá.
#
# Você vai preencher os 3 manifestos abaixo (Secret, PVC, Deployment).
# Use o comandos.sh do desafio pra rodar os passos de validação.
#
# 💡 Dicas:
#   - Postgres precisa de POSTGRES_PASSWORD (use Secret, nada de plaintext)
#   - dados ficam em /var/lib/postgresql/data
#   - access mode = ReadWriteOnce (1 réplica só — mais que isso quebra)
#   - strategy: Recreate no Deployment (não pode ter 2 pods montando o mesmo
#     PVC RWO ao mesmo tempo durante rollout)
#   - subPath: "pgdata" é boa ideia (Postgres reclama se a pasta raiz do
#     volume não estiver vazia em alguns provisioners)

