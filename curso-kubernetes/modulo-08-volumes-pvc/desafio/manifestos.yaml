# ============================
# SOLUÇÃO DE REFERÊNCIA
# (apague a linha abaixo e o "..." final pra ativar)
# ============================
#
# REMOVA A LINHA `kind: ConfigMap` ABAIXO PRA "DESLIGAR" O PLACEHOLDER E
# DEIXAR SÓ A SOLUÇÃO ABAIXO ATIVA:
---
# Solução —-----------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_PASSWORD: "estudo-k8s-2026"
  POSTGRES_DB: "loja"
  POSTGRES_USER: "admin"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  # Recreate: mata o pod antigo antes de subir o novo.
  # Necessário pra PVC RWO — 2 pods não podem montar ao mesmo tempo.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
              name: pg
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              subPath: pgdata        # Postgres exige pasta limpa; subPath ajuda
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "admin", "-d", "loja"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-pvc
---
# Service ClusterIP — opcional, pra conectar via DNS dentro do cluster.
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: pg
