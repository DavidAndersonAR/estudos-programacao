# Pod que usa o PVC "dados-pvc".
# A ideia é:
#   1. kubectl apply -f pvc.yaml + pod-pvc.yaml
#   2. exec no pod e escreve algo em /dados/anotacoes.txt
#   3. kubectl delete pod pod-pvc          (PVC continua existindo)
#   4. kubectl apply -f pod-pvc.yaml       (pod novo, mesmo PVC)
#   5. exec e lê /dados/anotacoes.txt → o arquivo continua lá.
apiVersion: v1
kind: Pod
metadata:
  name: pod-pvc
  labels:
    app: pvc-demo
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]   # pod fica vivo pra exec
      volumeMounts:
        - name: dados
          mountPath: /dados      # tudo gravado aqui vai pro PVC
  volumes:
    - name: dados
      persistentVolumeClaim:
        claimName: dados-pvc     # nome do PVC criado em pvc.yaml
