# 🎯 DESAFIO MÓDULO 09 — Postgres como StatefulSet
#
# Você precisa montar 3 manifestos neste arquivo (separados por ---):
#
#   1) Secret  "pg-secret"     — guarda POSTGRES_PASSWORD (use stringData)
#   2) Service "pg-svc"        — Headless (clusterIP: None), porta 5432
#   3) StatefulSet "postgres"  — 1 réplica, imagem postgres:16-alpine
#                                volumeClaimTemplates de 1Gi montado em
#                                /var/lib/postgresql/data
#                                env POSTGRES_PASSWORD vindo da Secret
#                                serviceName: pg-svc
#
# 💡 Dicas:
#   - Postgres precisa de PGDATA num subdir do mount, OU mount em /var/lib/postgresql/data
#     com a env PGDATA=/var/lib/postgresql/data/pgdata pra evitar conflito com lost+found.
#   - Use labels { app: postgres } pra amarrar tudo (selector do svc, selector do sts,
#     labels do pod template).
#   - StorageClass default do kind é "standard" — não precisa declarar storageClassName.
#
# Validação esperada (depois de aplicar):
#   kubectl get sts,svc,pvc,secret
#   - sts postgres 1/1 READY
#   - svc pg-svc CLUSTER-IP <none>
#   - pvc data-postgres-0 Bound
#
