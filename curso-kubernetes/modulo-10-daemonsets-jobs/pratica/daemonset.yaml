# DaemonSet — 1 pod em cada node, automaticamente.
# Em kind com 1 node => 1 pod. Com --workers 2 => 3 pods (1 por node).
# Imagine isso como um "agente de log" rodando em cada máquina.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-agent
  labels:
    app: log-agent
spec:
  selector:
    matchLabels:
      app: log-agent
  template:
    metadata:
      labels:
        app: log-agent
    spec:
      containers:
        - name: agent
          image: busybox:1.36
          # Simula um agente: a cada 10s, "coleta log" do node.
          command:
            - sh
            - -c
            - |
              while true; do
                echo "[$(date)] coletando logs do node $NODE_NAME"
                sleep 10
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
