# Job clássico do K8s — calcular pi com 2000 dígitos usando perl.
# Roda 1 vez, com até 4 retries em caso de falha, e auto-deleta 5min depois de terminar.
apiVersion: batch/v1
kind: Job
metadata:
  name: pi
spec:
  completions: 1            # quero 1 sucesso pra considerar Complete
  parallelism: 1            # rodando 1 por vez
  backoffLimit: 4           # até 4 tentativas em caso de falha
  ttlSecondsAfterFinished: 300  # some 5min depois (evita lixo no cluster)
  template:
    spec:
      restartPolicy: Never  # em Job só pode Never ou OnFailure
      containers:
        - name: pi
          image: perl:5.34
          command:
            - perl
            - -Mbignum=bpi
            - -wle
            - print bpi(2000)
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
