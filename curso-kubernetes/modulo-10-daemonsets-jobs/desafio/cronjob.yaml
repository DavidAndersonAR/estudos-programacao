# 🎯 DESAFIO MÓDULO 10 — CronJob de Backup
#
# Cenário: simule um backup diário do "banco de dados". O backup é só
# um arquivo com data + dump fake, escrito num volume compartilhado.
#
# OBJETIVOS:
# 1. Schedule: rodar a cada 2 minutos (pra testar rápido — em prod seria "0 2 * * *")
# 2. Cada execução escreve um arquivo backup-<timestamp>.sql em /backups
# 3. Listar os backups existentes no log antes de criar o novo
# 4. concurrencyPolicy: Forbid (não quer 2 backups brigando pelo volume)
# 5. successfulJobsHistoryLimit: 2 (só guarda histórico dos 2 últimos sucessos)
# 6. failedJobsHistoryLimit: 1
# 7. Volume: emptyDir é suficiente (some quando o pod some, mas serve pra demo)
# 8. ttlSecondsAfterFinished pra Jobs não acumularem
#
# 💡 DICAS:
# - Em prod o volume seria PersistentVolumeClaim, não emptyDir
# - Use `command: ["sh","-c", "..."]` pra rodar várias linhas de shell
# - Pra timestamp num nome de arquivo: $(date +%Y%m%d-%H%M%S)
# - Não esqueça restartPolicy (OnFailure ou Never — Always não funciona)

