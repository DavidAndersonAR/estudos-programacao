# 🎯 DESAFIO DO MÓDULO 11 — Roteamento por PATH
#
# Cenário: você tem UM domínio só (app.local.test) e precisa servir 3 apps
# diferentes baseado no caminho da URL:
#
#   GET app.local.test/api/...     → Service "api"
#   GET app.local.test/static/...  → Service "static"
#   GET app.local.test/...         → Service "default" (catch-all)
#
# Objetivo:
#   1. Crie 3 Deployments + 3 Services (api, static, default).
#      Use http-echo com texto diferente em cada um.
#   2. Crie UM Ingress só, com host "app.local.test" e 3 paths.
#   3. Path types: use Prefix em todos.
#   4. Ordem importa? Investigue: tente colocar /api depois de /, e veja se quebra.
#      (Spoiler: o nginx-ingress ordena por especificidade, então não quebra.
#       Mas em outros controllers pode dar zica. Cuidado.)
#
# ⚠️ Adicione no /etc/hosts antes:
#     127.0.0.1  app.local.test
#
# Aplique tudo num arquivo só (este aqui) com `kubectl apply -f manifestos.yaml`.
# Depois rode os curls do desafio/comandos.sh.

