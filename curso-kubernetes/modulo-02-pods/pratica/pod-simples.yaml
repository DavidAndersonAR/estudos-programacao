# Pod simples — 1 container rodando nginx.
# Apply: kubectl apply -f pod-simples.yaml
apiVersion: v1
kind: Pod
metadata:
  name: nginx-simples
  labels:
    app: nginx
    tipo: simples
spec:
  restartPolicy: Always
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
          name: http
