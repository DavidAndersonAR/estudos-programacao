# 🎯 DESAFIO MÓDULO 02 — Init container preparando config pro app
#
# Objetivo: completar este YAML pra que:
#   1. Um init container gere o arquivo /shared/config.json
#      com algum conteúdo (ex: {"versao":"1.0","ambiente":"dev"}).
#   2. O container principal (busybox) leia esse arquivo e imprima no log,
#      depois fique vivo pra você poder fazer exec.
#   3. Os dois compartilhem um volume emptyDir chamado "config-vol"
#      montado em /shared.
#
# Apply: kubectl apply -f pod.yaml
# Conferir: kubectl logs init-desafio -c app
#
# Solução comentada no final.

apiVersion: v1
kind: Pod
metadata:
  name: init-desafio
  labels:
    desafio: modulo-02
spec:
  restartPolicy: OnFailure

  # TODO 1: declarar o volume emptyDir chamado "config-vol"
