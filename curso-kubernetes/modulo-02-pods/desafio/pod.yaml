  #     image: ???
  #     command: ["sh", "-c", "echo '...' > /shared/config.json"]
  #     volumeMounts:
  #       - name: ???
  #         mountPath: /shared

  containers:
    # TODO 3: container "app" que lê o config e fica vivo
    # - imagem: busybox
    # - command: cat /shared/config.json e depois sleep 3600
    # - montar config-vol em /shared
    - name: app
      image: busybox
      command: ["sh", "-c", "echo TODO: leia /shared/config.json && sleep 3600"]
