# Módulo 12 — Network Policies / Prática
# 3 deployments + services pra simular um mini-stack:
#   frontend  → cliente (não devia ter acesso direto ao banco)
#   api       → o único que pode falar com o banco
#   db        → postgres simulado
#
# Tudo no namespace "lab" pra não bagunçar o default.
---
apiVersion: v1
kind: Namespace
metadata:
  name: lab
---
# ----- DB (postgres) -----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
      tier: db
  template:
    metadata:
      labels:
        app: db
        tier: db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_PASSWORD
              value: "secret123"
            - name: POSTGRES_DB
              value: "banco"
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: lab
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
---
# ----- API (usaremos alpine + netcat pra simular cliente do db) -----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
      tier: api
  template:
    metadata:
      labels:
        app: api
        tier: api
    spec:
      containers:
        - name: api
          image: nicolaka/netshoot
          command: ["sleep", "infinity"]
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: lab
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80
---
# ----- Frontend (também netshoot pra a gente testar acesso indevido) -----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      tier: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: nicolaka/netshoot
          command: ["sleep", "infinity"]
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: lab
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
