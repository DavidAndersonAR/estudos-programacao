# 🎯 DESAFIO DO MÓDULO 15 — App dimensionado + HPA com behavior customizado
#
# Contexto:
# Você tá subindo um app web (use a mesma imagem registry.k8s.io/hpa-example).
# O time de SRE reclamou que o HPA padrão escala AGRESSIVO demais — em pico
# rápido, ele dobra réplicas em segundos e custa caro na cloud.
#
# Seu trabalho:
# 1. Criar Deployment "api" com resources bem definidos:
#      - QoS class: Burstable
#      - request cpu: 150m, request memory: 64Mi
#      - limit cpu: 400m, limit memory: 128Mi
#      - 2 réplicas iniciais
# 2. Criar Service ClusterIP "api" na porta 80
# 3. Criar HPA "api" com:
#      - min 2, max 8 réplicas
#      - alvo: 60% de CPU
#      - behavior customizado:
#         * subir no máximo 50% de réplicas a cada 60s
#         * descer no máximo 1 pod a cada 120s
#         * estabilização ao descer: 300s (5min) — evita yo-yo
#
# 💡 Dicas:
#   - Doc do behavior: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/#configurable-scaling-behavior
#   - behavior tem scaleUp e scaleDown, cada um com:
#       - stabilizationWindowSeconds
#       - policies: [{ type: Percent|Pods, value: N, periodSeconds: N }]
#       - selectPolicy: Max|Min|Disabled
#   - Pra QoS Burstable: requests != limits (já tá no enunciado, só conferir)
#
# Aplique e gere carga. O HPA deve escalar de forma MAIS CONTROLADA que o padrão.

