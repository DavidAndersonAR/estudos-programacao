# Deployment v1 — versão "estável" rodando
# Estratégia conservadora: maxUnavailable=0 garante zero-downtime real.
# readinessProbe é o que sustenta esse zero-downtime na prática.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  labels:
    app: webapp
spec:
  replicas: 4
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # nunca derruba antes de subir o novo
      maxSurge: 1         # 1 pod extra por vez (lento porém seguro)
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
        version: v1
    spec:
      containers:
        - name: web
          # hashicorp/http-echo responde com texto fixo na porta 5678 — perfeito pra ver versão trocando
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=Hello from v1"
            - "-listen=:5678"
          ports:
            - containerPort: 5678
          readinessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 2
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: webapp
spec:
  selector:
    app: webapp
  ports:
    - port: 80
      targetPort: 5678
