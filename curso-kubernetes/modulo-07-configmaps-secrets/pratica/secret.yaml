apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  labels:
    app: app-configuravel
type: Opaque
# stringData = voce escreve em texto puro, o cluster codifica em base64.
# Mais legivel que 'data' (que exige base64 manual).
stringData:
  DB_PASSWORD: "s3nh@-super-secreta"
  DB_USER: "admin"
# Equivalente usando 'data' (base64 manual):
# data:
#   DB_PASSWORD: czNuaEAtc3VwZXItc2VjcmV0YQ==
#   DB_USER: YWRtaW4=
