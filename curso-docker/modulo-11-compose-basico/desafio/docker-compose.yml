# 🎯 DESAFIO MÓDULO 11 — Stack 3 serviços: Redis + Postgres + Adminer
#
# Objetivo:
# Subir uma stack típica de back-end (cache + banco + UI de admin)
# com tudo persistente, rede compartilhada e restart automático.
#
# Requisitos:
# 1. Postgres 16 — porta interna 5432, volume persistente, user/pass/db via env
# 2. Redis 7    — porta interna 6379, volume persistente (com appendonly ligado)
# 3. Adminer    — exposto na porta 8080 do host, conecta ao Postgres
# 4. Todos na mesma rede nomeada (não usar a default do Compose)
# 5. restart: unless-stopped em todos
# 6. Adminer só sobe depois do Postgres (depends_on)
#
# Variáveis de ambiente esperadas (documente cada uma):
#   POSTGRES_USER     — usuário do Postgres
#   POSTGRES_PASSWORD — senha do Postgres
#   POSTGRES_DB       — nome do banco inicial criado no boot
#
# 💡 Dicas:
#   - Volumes named se declaram no topo, na seção `volumes:`
#   - Redes nomeadas se declaram em `networks:` e cada serviço lista quais usa
#   - Pra Redis persistir, passe: command: redis-server --appendonly yes
#   - Adminer fala com Postgres pelo nome do serviço (hostname interno)

