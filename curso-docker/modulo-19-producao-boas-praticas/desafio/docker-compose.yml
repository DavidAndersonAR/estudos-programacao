services:

  api:
    # TODO D1 — usar tag imutável (SHA/semver), não :latest
    # TODO D2 — em prod não se faz build dentro do compose; usar imagem do registry
    build: .
    image: minha-api:latest

    container_name: minha-api

    # TODO R4 — restart deve ser unless-stopped ou on-failure (não always)
    restart: always

    # TODO D3 — em DEV monta código pra hot reload. Em PROD NÃO.
    volumes:
      - ./src:/app/src
      - ./node_modules:/app/node_modules

    # TODO D4 — secret NÃO vai como environment plain.
    # Usar `secrets:` montado em /run/secrets/<nome>.
    environment:
      NODE_ENV: development          # TODO: production
      LOG_LEVEL: debug                # TODO: info
      DB_HOST: db
      DB_USER: appuser
      DB_PASSWORD: supersecret123     # TODO D4 — REMOVER, usar secret
      JWT_SIGNING_KEY: dev-key-123    # TODO D4 — REMOVER, usar secret

    # TODO R5 — adicionar limites de recurso (cpus, memory)
    # TODO R6 — adicionar read_only: true + tmpfs
    # TODO R7 — adicionar cap_drop: [ALL] + security_opt: no-new-privileges
    # TODO R8/R9 — adicionar logging driver com rotação

    # TODO: adicionar healthcheck e depends_on com condition: service_healthy

    ports:
      - "3000:3000"

    networks:
      - default

  db:
    image: postgres:latest            # TODO D1 — fixar versão (postgres:16.2-alpine)
    restart: always                   # TODO R4

    environment:
      POSTGRES_USER: appuser
      POSTGRES_DB: appdb
      POSTGRES_PASSWORD: supersecret123  # TODO D4 — usar POSTGRES_PASSWORD_FILE + secret

    # TODO D7 — banco NÃO precisa expor porta pra fora; comentar isso em prod
    ports:
      - "5432:5432"

    # TODO D5 — usar volume nomeado, não bind do host
    volumes:
      - ./pgdata:/var/lib/postgresql/data

    # TODO D6 — banco deve estar em rede backend interna (internal: true)

    networks:
      - default

# TODO D5 — declarar volumes nomeados
# TODO D6 — declarar rede `backend` com internal: true e isolar o db
# TODO D4 — declarar `secrets:` apontando pra arquivos em ./secrets/

