# 🎯 DESAFIO DO MÓDULO 12 — Stack de 5 serviços com profiles
#
# Sua missão: completar este compose pra subir uma stack realista de
# microserviços com healthchecks, networks isoladas e um profile "dev"
# que sobe um adminer extra (admin do Postgres pelo browser).
#
# SERVIÇOS:
#   1. nginx       (frontend, porta 80→${NGINX_PORT})
#   2. api         (backend Node — usaremos a imagem oficial node:lts-alpine
#                   rodando um http server inline, sem precisar de código)
#   3. workers     (workers Python — python:3.12-alpine rodando um loop)
#   4. db          (postgres:16-alpine)
#   5. redis       (redis:7-alpine)
#   6. adminer     (só no profile "dev")
#
# REGRAS:
#   - api e workers DEPENDEM de db (healthy) e redis (healthy)
#   - nginx só conhece a api (network frontend)
#   - db/redis só ficam na network backend
#   - api fica em frontend E backend
#   - workers fica SÓ em backend (não é exposto pra fora)
#   - Use o anchor &hc-defaults pros healthchecks
#   - Todas as portas e senhas vêm do .env

